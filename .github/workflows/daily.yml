# Generated by Antigravity – daily GitHub Actions workflow
# Runs the football trend pipeline each day at 00:00 UTC

name: Daily Football Trend Pipeline
on:
  schedule:
    - cron: '0 */12 * * *'   # Every 12 hours
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Create .env from secrets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SHOTSTACK_API_KEY: ${{ secrets.SHOTSTACK_API_KEY }}
        run: |
          cat > .env <<EOF
          YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
          PEXELS_API_KEY=${PEXELS_API_KEY}
          SHOTSTACK_API_KEY=${SHOTSTACK_API_KEY}
          EOF
      - name: Write Google OAuth client secret
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          cat > client_secret.json <<EOF
          {
            "installed": {
              "client_id": "${GOOGLE_CLIENT_ID}",
              "client_secret": "${GOOGLE_CLIENT_SECRET}",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost"]
            }
          }
          EOF
      - name: Optional token restoration (if saved as secret)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          if [ -n "$YOUTUBE_TOKEN_JSON" ]; then
            echo "$YOUTUBE_TOKEN_JSON" > token.json
          fi
      - name: Run pipeline (render & upload)
        run: |
          python -m football_pipeline.cli run --render --upload

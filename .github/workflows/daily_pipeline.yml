name: Daily Football Pipeline

on:
  schedule:
    # Runs at 5:00 AM IST (11:30 PM UTC)
    - cron: '30 23 * * *'
    # Runs at 12:00 PM IST (6:30 AM UTC)
    - cron: '30 6 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fontconfig
          fc-cache -fv
          echo "=== FFmpeg version ==="
          ffmpeg -version | head -1
          echo "=== DejaVu fonts installed ==="
          fc-list | grep -i dejavu | head -5

      - name: Install Python dependencies
        run: pip install -e .

      - name: Cache rembg u2net models
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: ${{ runner.os }}-u2net
          restore-keys: |
            ${{ runner.os }}-u2net

      - name: Cache HuggingFace models (Chatterbox TTS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-huggingface-models
          restore-keys: |
            ${{ runner.os }}-huggingface-models

      - name: Create .env from secrets
        run: |
          printf 'YOUTUBE_API_KEY=%s\n' '${{ secrets.YOUTUBE_API_KEY }}' > .env
          printf 'GEMINI_API_KEY=%s\n' '${{ secrets.GEMINI_API_KEY }}' >> .env
          printf 'GEMINI_MODEL=gemini-3.5-flash\n' >> .env
          printf 'PEXELS_API_KEY=%s\n' '${{ secrets.PEXELS_API_KEY }}' >> .env
          printf 'YOUTUBE_CLIENT_SECRETS_FILE=client_secret.json\n' >> .env
          printf 'YOUTUBE_TOKEN_FILE=token.json\n' >> .env
          printf 'YOUTUBE_UPLOAD_PRIVACY_STATUS=public\n' >> .env
          printf 'YOUTUBE_UPLOAD_CATEGORY_ID=17\n' >> .env
          printf 'FIFA_CHANNEL_HANDLE=@FIFA\n' >> .env
          printf 'OUTPUT_DIR=runs\n' >> .env
          printf 'SCRIPT_SECONDS=45\n' >> .env
          printf 'MAX_SIGNALS_FOR_GEMINI=35\n' >> .env
          echo "=== .env written (keys only) ==="
          cut -d= -f1 .env

      - name: Create YouTube secrets from GitHub Secrets
        env:
          COOKIES: ${{ secrets.YOUTUBE_COOKIES_TXT }}
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
          fi

      - name: Run pipeline
        run: football-pipeline run --render --upload --cleanup

      - name: Save topic history to repo
        if: always()
        run: |
          if [ ! -f topic_history.json ]; then
            echo "No topic_history.json found, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history.json
          git diff --staged --quiet && echo "No history changes to commit." && exit 0
          git commit -m "chore: save topic history [skip ci]"
          git push origin HEAD:main

name: "Auto-Reply to Comments"

on:
  schedule:
    - cron: '0 21 * * *' # Runs at 21:00 UTC (3 hours after 18:00 UTC upload)
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install the project
        run: uv pip install -e . --system

      - name: Run Comment Bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Required for Gemini too
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
        run: |
          # Write out the stored token so the bot can authenticate without manual flow
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          # Write out the secrets file (required by google-auth)
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secret.json
          
          fb reply-comments

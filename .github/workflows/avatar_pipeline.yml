name: Avatar Video Pipeline

on:
  schedule:
    - cron: '0 6 */5 * *'
  workflow_dispatch:

jobs:
  avatar:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install modal pydub scipy -e .

      - name: Write .env from GitHub Secrets
        run: |
          cat > .env << 'ENVEOF'
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
          YOUTUBE_CLIENT_SECRETS_FILE=client_secret.json
          YOUTUBE_TOKEN_FILE=token.json
          YOUTUBE_UPLOAD_PRIVACY_STATUS=public
          YOUTUBE_UPLOAD_CATEGORY_ID=17
          OUTPUT_DIR=runs
          SCRIPT_SECONDS=300
          MODAL_TOKEN_ID=${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET=${{ secrets.MODAL_TOKEN_SECRET }}
          ENVEOF

      - name: Write YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}'          > token.json

      - name: Deploy to Modal
        run: modal deploy modal_avatar.py

      - name: Pre-download models to Persistent Volume (CPU-only, saves $)
        run: modal run modal_avatar.py::download_models

      - name: Run Avatar Pipeline
        run: python -m src.avatar_pipeline.run

      - name: Save history files back to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=0
          if [ -f topic_history.json ];  then git add topic_history.json;  CHANGED=1; fi
          if [ -f upload_history.json ]; then git add upload_history.json; CHANGED=1; fi
          if [ "$CHANGED" = "0" ]; then exit 0; fi
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "chore: update pipeline history [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
